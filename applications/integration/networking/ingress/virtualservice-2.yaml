apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: mongodb-virtualservice
spec:
  hosts:
  - "*"
  gateways:
  - istio-ingressgateway
  http:
  - match:
    - uri:
        prefix: /mongo
    route:
    - destination:
        host: mongo-service.storage.svc.cluster.local
        port:
          number: 27017