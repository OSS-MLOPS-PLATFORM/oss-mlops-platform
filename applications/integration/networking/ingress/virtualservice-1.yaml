apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: qdrant-virtualservice
spec:
  hosts:
  - '*'
  gateways:
  - qdrant-gateway
  http:
  - match:
    - uri:
      prefix: /qdrant
    route:
    - destination:
        host: qdrant-service.storage.svc.cluster.local
        port:
          number: 7201